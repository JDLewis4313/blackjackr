<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Blackjack</title>
</head>
<body>
  <nav>
    <a href="{{ url_for('core.index') }}">Home</a> |
    <a href="{{ url_for('player_auth.login') }}">Log In</a> |
    <a href="{{ url_for('player_auth.register') }}">Register</a> |
    <a href="{{ url_for('player_auth.logout') }}">Log Out</a>
  </nav>
  <hr>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="flash {{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
