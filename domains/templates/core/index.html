{% extends 'base.html' %}

{% block content %}
  <h2>Welcome {{ user.name if user.is_authenticated else 'Guest' }}</h2>
  {% if user.is_authenticated %}
    <p><a href="{{ url_for('game.play') }}">Play Blackjack</a></p>
  {% else %}
    <p>Please log in or register to play.</p>
  {% endif %}
{% endblock %}
