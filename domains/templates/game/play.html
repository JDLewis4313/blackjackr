<!DOCTYPE html>
<html>
<head>
    <title>Blackjack</title>
</head>
<body>
    <h1>Blackjack Game</h1>

    <h2>Your Hand: {{ state.player_hand }}</h2>
    <p>Your Score: {{ state.player_score }}</p>

    <h2>Dealer's Hand: {{ state.dealer_hand }}</h2>
    <p>Dealer's Score: {{ state.dealer_score }}</p>

    {% if state.result %}
        <h3>Result: {{ state.result }}</h3>
        <form method="post" action="/game/start">
            <button type="submit">Start New Game</button>
        </form>
    {% else %}
        <form method="post" action="/game/hit">
            <button type="submit">Hit</button>
        </form>
        <form method="post" action="/game/stand">
            <button type="submit">Stand</button>
        </form>
    {% endif %}
</body>
</html>
